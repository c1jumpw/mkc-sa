<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Uploader</title>
<style>
  :root{
    --bg:#0e1116;
    --panel:#151a21;
    --panel-2:#1b212a;
    --line:#262e39;
    --text:#e6e9ef;
    --text-dim:#8b95a5;
    --accent:#5ec9a8;
    --accent-dim:#2f5c4e;
    --warn:#e0a94c;
    --err:#e0684c;
    --ok:#5ec9a8;
    --mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:var(--sans); -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  .wrap{max-width:720px; margin:0 auto; padding:20px 16px 60px;}
  header{display:flex; align-items:center; gap:10px; margin-bottom:18px;}
  .logo{
    width:34px; height:34px; border-radius:8px;
    background:linear-gradient(135deg, var(--accent), #3a8f78);
    display:flex; align-items:center; justify-content:center;
    font-family:var(--mono); font-weight:700; color:#0e1116; font-size:15px;
    flex-shrink:0;
  }
  h1{font-size:17px; margin:0; font-weight:600; letter-spacing:-0.01em;}
  .sub{color:var(--text-dim); font-size:12.5px; margin-top:1px;}

  .status-pill{
    display:inline-flex; align-items:center; gap:6px; font-size:11.5px; font-weight:600;
    padding:5px 11px; border-radius:20px; margin-bottom:16px;
  }
  .status-pill.ok{background:var(--accent-dim); color:var(--accent);}
  .status-pill.bad{background:#3a231f; color:var(--err);}
  .status-dot{width:6px; height:6px; border-radius:50%; background:currentColor;}

  .card{background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:16px; margin-bottom:14px;}
  .card h2{font-size:13px; margin:0 0 12px; color:var(--text-dim); text-transform:uppercase; letter-spacing:.06em; font-weight:700;}

  label{display:block; font-size:12.5px; color:var(--text-dim); margin:10px 0 5px; font-weight:600;}
  label:first-child{margin-top:0;}
  input[type=text], select{
    width:100%; background:var(--panel-2); border:1px solid var(--line); color:var(--text);
    padding:10px 11px; border-radius:8px; font-size:14px; font-family:var(--mono);
    outline:none;
  }
  input[type=text]:focus, select:focus{border-color:var(--accent);}
  .hint{font-size:11.5px; color:var(--text-dim); margin-top:5px; line-height:1.4;}

  .profile-bar{display:flex; gap:8px; margin-bottom:2px;}
  .profile-bar select{flex:1;}

  button{
    font-family:var(--sans); font-weight:600; font-size:13.5px; border:none; border-radius:8px;
    padding:10px 16px; cursor:pointer; transition:filter .1s, opacity .1s;
  }
  button:active{filter:brightness(.9);}
  button:disabled{opacity:.45; cursor:not-allowed;}
  .btn-primary{background:var(--accent); color:#0d1712; width:100%;}
  .btn-secondary{background:var(--panel-2); color:var(--text); border:1px solid var(--line);}
  .btn-danger{background:transparent; color:var(--err); border:1px solid #5a2f2a;}
  .btn-small{padding:6px 11px; font-size:12px; white-space:nowrap;}

  .drop{
    border:1.5px dashed var(--line); border-radius:12px; padding:26px 16px; text-align:center;
    color:var(--text-dim); font-size:13px; cursor:pointer; transition:border-color .15s, background .15s;
  }
  .drop.drag{border-color:var(--accent); background:var(--panel-2);}
  .drop strong{color:var(--text);}
  #fileInput{display:none;}

  .filelist{margin-top:12px;}
  .file-row{
    display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid var(--line);
    font-size:13px;
  }
  .file-row:last-child{border-bottom:none;}
  .file-name{flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .file-size{color:var(--text-dim); font-size:11.5px; font-family:var(--mono); flex-shrink:0;}
  .file-size.oversize{color:var(--err);}
  .file-remove{color:var(--text-dim); cursor:pointer; padding:2px 6px; flex-shrink:0;}

  .warn-banner{
    background:#2a2213; border:1px solid #4a3a1a; color:var(--warn); font-size:12px;
    border-radius:8px; padding:9px 11px; margin-top:10px; line-height:1.5;
  }
  .err-banner{
    background:#2a1c19; border:1px solid #5a2f2a; color:var(--err); font-size:12px;
    border-radius:8px; padding:9px 11px; margin-bottom:14px; line-height:1.5;
  }

  .log{margin-top:14px; display:flex; flex-direction:column; gap:10px;}
  .log-item{background:var(--panel-2); border:1px solid var(--line); border-radius:10px; padding:11px 13px;}
  .log-head{display:flex; justify-content:space-between; align-items:baseline; gap:8px;}
  .log-name{font-size:13px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .log-size{font-size:11px; color:var(--text-dim); font-family:var(--mono); flex-shrink:0;}
  .log-steps{font-family:var(--mono); font-size:11.5px; color:var(--text-dim); margin-top:7px; line-height:1.75;}
  .step-ok{color:var(--ok);}
  .step-err{color:var(--err);}
  .step-tag{display:inline-block; width:64px; color:var(--text-dim); opacity:.7;}
  .log-link{font-size:11.5px; margin-top:6px;}
  .log-link a{color:var(--accent); text-decoration:none;}
  .log-link a:hover{text-decoration:underline;}

  .empty{color:var(--text-dim); font-size:13px; text-align:center; padding:14px 0;}
  .footer-actions{display:flex; gap:8px; margin-top:14px;}
  .footer-actions button{flex:1;}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="logo">↑</div>
    <div>
      <h1>GitHub Uploader</h1>
      <div class="sub">Push files into pdl/media — no PowerShell, no token to type</div>
    </div>
  </header>

  <div id="statusPill" class="status-pill ok"><span class="status-dot"></span><span id="statusText">Checking relay…</span></div>

  <div class="card">
    <h2>Destination</h2>

    <label>Repository</label>
    <select id="repoSelect"><option value="">Loading your repos…</option></select>
    <div class="hint" id="repoHint">Pulled live from your account — new repos show up automatically.</div>

    <div class="profile-bar" style="margin-top:12px;">
      <select id="folderPreset">
        <option value="">Choose a saved folder…</option>
      </select>
      <button class="btn-secondary btn-small" id="savePresetBtn">Save current</button>
    </div>

    <label>Folder</label>
    <input type="text" id="folder" placeholder="e.g. pdl/media/wealth  (blank = repo root)">
  </div>

  <div class="card">
    <h2>Files</h2>
    <div class="drop" id="dropZone">
      <strong>Tap to choose files</strong><br>or drag &amp; drop here
    </div>
    <input type="file" id="fileInput" multiple>
    <div class="filelist" id="fileList"></div>
    <div class="warn-banner" id="sizeWarning" style="display:none;"></div>
    <button class="btn-primary" id="uploadBtn" style="margin-top:14px;" disabled>Upload files</button>
  </div>

  <div class="card" id="logCard" style="display:none;">
    <h2>Progress</h2>
    <div class="log" id="log"></div>
    <div class="footer-actions" id="retryBar" style="display:none;">
      <button class="btn-secondary" id="retryFailedBtn">Retry failed files</button>
    </div>
  </div>

</div>

<script>
(function(){
  "use strict";

  // ---- CONFIGURE YOUR RELAY HERE ----
  // Paste in the values shown after you deploy the Cloudflare Worker (see the setup
  // instructions you were given alongside this file). UPLOAD_KEY is the *broad* key —
  // different from the PDL app's key — that unlocks writes across all your repos.
const CONFIG = {
  WORKER_URL: "https://pdl-relay.c1-jumpw.workers.dev",
  UPLOAD_KEY: "ncbchfgy67uGHCds8fgbrjfsg7"
};
  // ------------------------------------

  const LS_PRESETS = "ghup_dest_presets_v2";
  const el = id => document.getElementById(id);
  const folderEl = el("folder");

  let repos = [];
  let selectedRepo = "";
  let selectedBranch = "main";

  function relayFetch(path, opts){
    opts = opts || {};
    opts.headers = Object.assign({ "X-Upload-Key": CONFIG.UPLOAD_KEY }, opts.headers || {});
    return fetch(CONFIG.WORKER_URL.replace(/\/+$/, "") + path, opts);
  }

  // ---------- relay connectivity + repo discovery ----------
  async function loadRepos(){
    if (!CONFIG.WORKER_URL || CONFIG.WORKER_URL.includes("PASTE-YOUR")){
      el("statusPill").className = "status-pill bad";
      el("statusText").textContent = "CONFIG.WORKER_URL still has a placeholder — paste your real Worker URL at the top of this file.";
      return;
    }
    let res;
    try{
      res = await relayFetch("/repo-list", { method: "GET" });
    } catch(networkErr){
      el("statusPill").className = "status-pill bad";
      el("statusText").textContent = "Network error reaching the relay: " + networkErr.message + " — double-check the Worker URL is correct and the Worker is deployed.";
      return;
    }
    if (res.status === 401){
      el("statusPill").className = "status-pill bad";
      el("statusText").textContent = "The relay rejected the upload key (401) — make sure CONFIG.UPLOAD_KEY here matches UPLOAD_APP_KEY in the Worker's settings exactly.";
      return;
    }
    if (!res.ok){
      const body = await res.json().catch(() => ({}));
      el("statusPill").className = "status-pill bad";
      el("statusText").textContent = `Relay error (${res.status}): ${body.message || "unknown error"}`;
      return;
    }
    repos = await res.json();
    el("statusPill").className = "status-pill ok";
    el("statusText").textContent = `Connected · ${repos.length} repo${repos.length === 1 ? "" : "s"} available`;
    refreshRepoDropdown();
  }

  function refreshRepoDropdown(){
    const sel = el("repoSelect");
    sel.innerHTML = '<option value="">Choose a repository…</option>';
    repos.forEach(r => {
      const opt = document.createElement("option");
      opt.value = r.name;
      opt.dataset.branch = r.default_branch;
      opt.textContent = r.name + (r.private ? " (private)" : "");
      sel.appendChild(opt);
    });
  }

  el("repoSelect").addEventListener("change", e => {
    const opt = e.target.selectedOptions[0];
    selectedRepo = e.target.value;
    selectedBranch = (opt && opt.dataset.branch) || "main";
    validateUploadBtn();
  });

  // ---------- destination presets ----------
  function loadPresets(){ try { return JSON.parse(localStorage.getItem(LS_PRESETS) || "[]"); } catch(e){ return []; } }
  function savePresets(list){ localStorage.setItem(LS_PRESETS, JSON.stringify(list)); }

  function refreshPresetDropdown(){
    const sel = el("folderPreset");
    const list = loadPresets();
    sel.innerHTML = '<option value="">Choose a saved folder…</option>';
    list.forEach((p, i) => {
      const opt = document.createElement("option");
      opt.value = i;
      opt.textContent = `${p.repo} / ${p.folder || "(root)"}`;
      sel.appendChild(opt);
    });
  }
  refreshPresetDropdown();

  el("folderPreset").addEventListener("change", e => {
    if (e.target.value === "") return;
    const p = loadPresets()[+e.target.value];
    if (!p) return;
    el("repoSelect").value = p.repo;
    el("repoSelect").dispatchEvent(new Event("change"));
    folderEl.value = p.folder || "";
  });
  el("savePresetBtn").addEventListener("click", () => {
    if (!selectedRepo){ alert("Choose a repository first."); return; }
    const list = loadPresets();
    const entry = { repo: selectedRepo, folder: folderEl.value.trim() };
    if (!list.some(p => p.repo === entry.repo && p.folder === entry.folder)){
      list.push(entry); savePresets(list); refreshPresetDropdown();
    }
  });

  // ---------- file selection ----------
  const MAX_MB = 95; // GitHub's Git Data API hard-blocks blobs over 100MB; we leave a safety margin
  let selectedFiles = [];

  const dropZone = el("dropZone"), fileInput = el("fileInput");
  dropZone.addEventListener("click", () => fileInput.click());
  ["dragenter","dragover"].forEach(ev => dropZone.addEventListener(ev, e => {
    e.preventDefault(); dropZone.classList.add("drag");
  }));
  ["dragleave","drop"].forEach(ev => dropZone.addEventListener(ev, e => {
    e.preventDefault(); dropZone.classList.remove("drag");
  }));
  dropZone.addEventListener("drop", e => addFiles(e.dataTransfer.files));
  fileInput.addEventListener("change", e => addFiles(e.target.files));

  function addFiles(fileListObj){
    Array.from(fileListObj).forEach(f => selectedFiles.push(f));
    renderFileList();
  }

  function fmtSize(bytes){
    const mb = bytes / (1024*1024);
    return mb >= 1 ? mb.toFixed(1) + " MB" : (bytes/1024).toFixed(0) + " KB";
  }

  function renderFileList(){
    const box = el("fileList");
    box.innerHTML = "";
    let anyOversize = false;
    selectedFiles.forEach((f, i) => {
      const oversize = f.size > MAX_MB * 1024 * 1024;
      if (oversize) anyOversize = true;
      const row = document.createElement("div");
      row.className = "file-row";
      row.innerHTML = `
        <span class="file-name">${f.name}</span>
        <span class="file-size ${oversize ? 'oversize' : ''}">${fmtSize(f.size)}</span>
        <span class="file-remove" data-i="${i}">✕</span>`;
      box.appendChild(row);
    });
    box.querySelectorAll(".file-remove").forEach(b => b.addEventListener("click", () => {
      selectedFiles.splice(+b.dataset.i, 1);
      renderFileList();
    }));
    const warn = el("sizeWarning");
    if (anyOversize){
      warn.style.display = "block";
      warn.textContent = `One or more files are over ~${MAX_MB}MB. GitHub hard-blocks anything over 100MB from this API — those will be skipped with a clear error instead of retried. Use Git LFS or a local git push for those.`;
    } else {
      warn.style.display = "none";
    }
    validateUploadBtn();
  }

  function validateUploadBtn(){
    el("uploadBtn").disabled = selectedFiles.length === 0 || !selectedRepo;
  }

  // ---------- relay-backed GitHub Git Data flow ----------
  function fileToBase64(file){
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => {
        const result = reader.result;
        resolve(result.slice(result.indexOf(",") + 1));
      };
      reader.onerror = () => reject(reader.error || new Error("Could not read file"));
      reader.readAsDataURL(file);
    });
  }

  function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }

  async function uploadOneFile(file, repo, branch, folder, stepFn){
    stepFn("read", "pending", `encoding ${file.name}...`);
    const b64 = await fileToBase64(file);
    stepFn("read", "ok");

    stepFn("blob", "pending", "creating blob object...");
    const blobRes = await relayFetch(`/repo/${encodeURIComponent(repo)}/blob`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ content: b64, encoding: "base64" })
    });
    if (!blobRes.ok){
      const errBody = await blobRes.json().catch(() => ({}));
      const msg = errBody.message || `HTTP ${blobRes.status}`;
      const isSizeError = blobRes.status === 422 && /too large/i.test(msg);
      stepFn("blob", "error", msg);
      return { ok:false, retryable: !isSizeError, message: msg };
    }
    const blobSha = (await blobRes.json()).sha;
    stepFn("blob", "ok");

    const cleanFolder = folder.replace(/^\/+|\/+$/g, "");
    const path = cleanFolder ? `${cleanFolder}/${file.name}` : file.name;

    stepFn("ref", "pending", "reading branch...");
    const refRes = await relayFetch(`/repo/${encodeURIComponent(repo)}/ref?branch=${encodeURIComponent(branch)}`, { method: "GET" });
    if (!refRes.ok){
      const msg = (await refRes.json().catch(()=>({}))).message || `HTTP ${refRes.status}`;
      stepFn("ref", "error", msg);
      return { ok:false, retryable:true, message: msg };
    }
    const refData = await refRes.json();
    const parentCommitSha = refData.object.sha;

    const commitRes = await relayFetch(`/repo/${encodeURIComponent(repo)}/commit/${parentCommitSha}`, { method: "GET" });
    const commitData = await commitRes.json();
    const baseTreeSha = commitData.tree.sha;
    stepFn("ref", "ok");

    stepFn("tree", "pending", `placing at ${path}...`);
    const treeRes = await relayFetch(`/repo/${encodeURIComponent(repo)}/tree`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        base_tree: baseTreeSha,
        tree: [{ path, mode: "100644", type: "blob", sha: blobSha }]
      })
    });
    if (!treeRes.ok){
      const msg = (await treeRes.json().catch(()=>({}))).message || `HTTP ${treeRes.status}`;
      stepFn("tree", "error", msg);
      return { ok:false, retryable: treeRes.status !== 403, message: msg };
    }
    const newTreeSha = (await treeRes.json()).sha;
    stepFn("tree", "ok");

    stepFn("commit", "pending", "writing commit...");
    const newCommitRes = await relayFetch(`/repo/${encodeURIComponent(repo)}/commit`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: `Add ${path}`, tree: newTreeSha, parents: [parentCommitSha] })
    });
    if (!newCommitRes.ok){
      const msg = (await newCommitRes.json().catch(()=>({}))).message || `HTTP ${newCommitRes.status}`;
      stepFn("commit", "error", msg);
      return { ok:false, retryable:true, message: msg };
    }
    const newCommitSha = (await newCommitRes.json()).sha;
    stepFn("commit", "ok");

    stepFn("ref-update", "pending", "updating branch pointer...");
    const updateRes = await relayFetch(`/repo/${encodeURIComponent(repo)}/ref?branch=${encodeURIComponent(branch)}`, {
      method: "PATCH",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ sha: newCommitSha })
    });
    if (!updateRes.ok){
      const msg = (await updateRes.json().catch(()=>({}))).message || `HTTP ${updateRes.status}`;
      stepFn("ref-update", "error", msg);
      return { ok:false, retryable:true, message: msg };
    }
    stepFn("ref-update", "ok");

    const fileUrl = `https://github.com/c1jumpw/${repo}/blob/${branch}/${path.split("/").map(encodeURIComponent).join("/")}`;
    return { ok:true, url: fileUrl, path };
  }

  async function uploadWithRetry(file, repo, branch, folder, logBox){
    const MAX_ATTEMPTS = 4;
    const oversize = file.size > MAX_MB * 1024 * 1024;

    const item = document.createElement("div");
    item.className = "log-item";
    item.innerHTML = `
      <div class="log-head">
        <span class="log-name">${file.name}</span>
        <span class="log-size">${fmtSize(file.size)}</span>
      </div>
      <div class="log-steps"></div>
      <div class="log-link"></div>`;
    logBox.appendChild(item);
    const stepsBox = item.querySelector(".log-steps");
    const linkBox = item.querySelector(".log-link");

    function stepFn(tag, status, detail){
      const line = document.createElement("div");
      const cls = status === "ok" ? "step-ok" : status === "error" ? "step-err" : "";
      const mark = status === "ok" ? "done" : status === "error" ? "error" : "…";
      line.className = cls;
      line.innerHTML = `<span class="step-tag">${tag}</span>${detail ? detail : mark}`;
      stepsBox.appendChild(line);
    }

    if (oversize){
      stepFn("size", "error", `File is ~${fmtSize(file.size)}, over the ~${MAX_MB}MB practical limit for this method. Use Git LFS or a local git push instead.`);
      return { ok:false, file };
    }

    let attempt = 0;
    while (attempt < MAX_ATTEMPTS){
      attempt++;
      if (attempt > 1){
        const wait = 800 * Math.pow(2, attempt - 2);
        const note = document.createElement("div");
        note.className = "step-err";
        note.textContent = `retrying (attempt ${attempt}/${MAX_ATTEMPTS}) after ${(wait/1000).toFixed(1)}s...`;
        stepsBox.appendChild(note);
        await sleep(wait);
      }
      const result = await uploadOneFile(file, repo, branch, folder, stepFn);
      if (result.ok){
        linkBox.innerHTML = `<a href="${result.url}" target="_blank">${result.path}</a>`;
        return { ok:true, file };
      }
      if (!result.retryable) return { ok:false, file };
    }
    const failNote = document.createElement("div");
    failNote.className = "step-err";
    failNote.textContent = "gave up after retries.";
    stepsBox.appendChild(failNote);
    return { ok:false, file };
  }

  let failedFiles = [];

  async function runUpload(filesToUpload){
    const folder = folderEl.value.trim();
    const repo = selectedRepo, branch = selectedBranch;
    if (!repo){ alert("Choose a repository first."); return; }

    el("uploadBtn").disabled = true;
    el("logCard").style.display = "block";
    el("retryBar").style.display = "none";
    const logBox = el("log");
    logBox.innerHTML = "";

    const stillFailed = [];
    for (const file of filesToUpload){
      const res = await uploadWithRetry(file, repo, branch, folder, logBox);
      if (!res.ok) stillFailed.push(file);
      await sleep(700); // let GitHub's replicas settle before the next ref read
    }

    failedFiles = stillFailed;
    if (failedFiles.length){
      el("retryBar").style.display = "flex";
    }
    el("uploadBtn").disabled = false;
  }

  el("uploadBtn").addEventListener("click", () => {
    if (!selectedFiles.length) return;
    runUpload(selectedFiles.slice());
  });

  el("retryFailedBtn").addEventListener("click", () => {
    if (!failedFiles.length) return;
    runUpload(failedFiles.slice());
  });

  loadRepos();
})();
</script>
</body>
</html>
